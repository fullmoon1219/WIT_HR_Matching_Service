<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-container">
        <div class="logo-container">
            <img th:src="@{/images/logo_no_background.png}" alt="로고">
        </div>
        
        <h2 class="title">비밀번호 찾기</h2>
        <p class="subtitle">가입하신 이메일로 비밀번호 변경 링크를 받아보실 수 있습니다.</p>
        
        <!-- 회원 유형 탭 -->
        <div class="tab-container">
            <div class="tab active" id="personal-tab">개인회원</div>
            <div class="tab" id="company-tab">기업회원</div>
        </div>
        
        <!-- 개인회원 내용 -->
        <div id="personal-content" class="tab-content active">
            <!-- 통합된 인증 방법 선택 및 내용 영역 -->
            <div class="find-id-tabs">
                <!-- 탭 헤더 -->
                <ul class="find-id-tab-headers equal-width">
                    <li class="find-id-tab-header active" data-tab="personal-phone">휴대폰 번호로 찾기</li>
                    <li class="find-id-tab-header" data-tab="personal-email">이메일 주소로 찾기</li>
                </ul>
                
                <!-- 탭 콘텐츠 -->
                <div class="find-id-tab-contents">
                    <!-- 휴대폰 인증 방식 -->
                    <div id="personal-phone-content" class="find-id-tab-content active">
                        <p class="guide-text">회원정보에 등록된 정보로 비밀번호를 찾을 수 있습니다.</p>
                        
                        <form th:action="@{/users/find-password/phone}" method="post">
                            <div class="form-group">
                                <label class="form-label">이메일</label>
                                <input type="text" name="email" class="input-field" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">이름</label>
                                <input type="text" name="name" class="input-field" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">생년월일</label>
                                <input type="text" name="birthDate" class="input-field" placeholder="YYYYMMDD" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">휴대폰 번호</label>
                                <div class="input-with-button">
                                    <input type="tel" name="phone" class="input-field" placeholder="'-'없이 입력" required>
                                    <button type="button" class="verification-button">인증번호 발송</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">인증번호</label>
                                <input type="text" name="verificationCode" class="input-field" placeholder="인증번호 입력" required>
                            </div>
                            
                            <div class="button-group">
                                <button type="submit" class="submit-button">확인</button>
                                <a th:href="@{/login}" class="cancel-button">취소</a>
                            </div>
                        </form>
                    </div>
                    
                    <!-- 이메일 인증 방식 -->
                    <div id="personal-email-content" class="find-id-tab-content">
                        <p class="guide-text">회원정보에 등록된 이메일로 비밀번호 재설정 링크를 받을 수 있습니다.</p>
                        
                        <form th:action="@{/users/find-password/email}" method="post">
                            <div class="form-group">
                                <label class="form-label">이메일</label>
                                <input type="email" name="email" class="input-field" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">이름</label>
                                <input type="text" name="name" class="input-field" required>
                            </div>
                            <div class="button-group">
                                <button type="submit" class="submit-button">이메일 발송</button>
                                <a th:href="@{/login}" class="cancel-button">취소</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 기업회원 비밀번호 찾기 영역 -->
        <div id="company-content" class="tab-content">
            <!-- 통합된 인증 방법 선택 및 내용 영역 -->
            <div class="find-id-tabs">
                <!-- 탭 헤더 -->
                <ul class="find-id-tab-headers equal-width">
                    <li class="find-id-tab-header active" data-tab="company-phone">휴대폰 번호로 찾기</li>
                    <li class="find-id-tab-header" data-tab="company-email">이메일 주소로 찾기</li>
                </ul>
                
                <!-- 탭 콘텐츠 -->
                <div class="find-id-tab-contents">
                    <!-- 휴대폰 인증 방식 -->
                    <div id="company-phone-content" class="find-id-tab-content active">
                        <p class="guide-text">회사정보에 등록된 정보로 비밀번호를 찾을 수 있습니다.</p>
                        
                        <form th:action="@{/company/find-password/phone}" method="post">
                            <div class="form-group">
                                <label class="form-label">이메일</label>
                                <input type="text" name="email" class="input-field" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">회사명</label>
                                <input type="text" name="companyName" class="input-field" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">담당자명</label>
                                <input type="text" name="managerName" class="input-field" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">담당자 휴대폰 번호</label>
                                <div class="input-with-button">
                                    <input type="tel" name="managerPhone" class="input-field" placeholder="'-'없이 입력" required>
                                    <button type="button" class="verification-button">인증번호 발송</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">인증번호</label>
                                <input type="text" name="verificationCode" class="input-field" placeholder="인증번호 입력" required>
                            </div>
                            
                            <div class="button-group">
                                <button type="submit" class="submit-button">확인</button>
                                <a th:href="@{/login}" class="cancel-button">취소</a>
                            </div>
                        </form>
                    </div>
                    
                    <!-- 이메일 인증 방식 -->
                    <div id="company-email-content" class="find-id-tab-content">
                        <p class="guide-text">회사정보에 등록된 이메일로 비밀번호 재설정 링크를 받을 수 있습니다.</p>
                        
                        <form th:action="@{/company/find-password/email}" method="post">
                            <div class="form-group">
                                <label class="form-label">이메일</label>
                                <input type="email" name="email" class="input-field" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">회사명</label>
                                <input type="text" name="companyName" class="input-field" required>
                            </div>
                            <div class="button-group">
                                <button type="submit" class="submit-button">이메일 발송</button>
                                <a th:href="@{/login}" class="cancel-button">취소</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="auth-links">
            <a th:href="@{/login}">로그인</a> | 
            <a th:href="@{/users/find-email}">이메일 찾기</a>
        </div>
    </div>
    
    <!-- 비밀번호 변경 모달 -->
    <div id="password-change-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>비밀번호 변경</h2>
            <form th:action="@{/users/reset-password}" method="post">
                <div class="form-group">
                    <label>새 비밀번호</label>
                    <input type="password" name="newPassword" class="input-field" placeholder="8~16자의 영문, 숫자, 특수문자 조합" required>
                </div>
                <div class="form-group">
                    <label>비밀번호 확인</label>
                    <input type="password" name="confirmPassword" class="input-field" required>
                </div>
                <input type="hidden" name="token" id="reset-token">
                <button type="submit" class="submit-button">비밀번호 변경</button>
            </form>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 회원 유형 탭 전환
            const personalTab = document.getElementById('personal-tab');
            const companyTab = document.getElementById('company-tab');
            const personalContent = document.getElementById('personal-content');
            const companyContent = document.getElementById('company-content');
            
            personalTab.addEventListener('click', function() {
                personalTab.classList.add('active');
                companyTab.classList.remove('active');
                personalContent.classList.add('active');
                companyContent.classList.remove('active');
            });
            
            companyTab.addEventListener('click', function() {
                companyTab.classList.add('active');
                personalTab.classList.remove('active');
                companyContent.classList.add('active');
                personalContent.classList.remove('active');
            });
            
            // 개인회원 인증 방식 탭 전환
            const personalTabHeaders = document.querySelectorAll('[data-tab^="personal-"]');
            personalTabHeaders.forEach(header => {
                header.addEventListener('click', function() {
                    // 모든 탭 헤더에서 active 클래스 제거
                    personalTabHeaders.forEach(h => h.classList.remove('active'));
                    // 클릭된 탭 헤더에 active 클래스 추가
                    this.classList.add('active');
                    
                    // 모든 탭 콘텐츠 숨기기
                    const tabContents = document.querySelectorAll('#personal-content .find-id-tab-content');
                    tabContents.forEach(content => content.classList.remove('active'));
                    
                    // 클릭된 탭에 해당하는 콘텐츠 표시
                    const tabContentId = this.getAttribute('data-tab') + '-content';
                    document.getElementById(tabContentId).classList.add('active');
                });
            });
            
            // 기업회원 인증 방식 탭 전환
            const companyTabHeaders = document.querySelectorAll('[data-tab^="company-"]');
            companyTabHeaders.forEach(header => {
                header.addEventListener('click', function() {
                    // 모든 탭 헤더에서 active 클래스 제거
                    companyTabHeaders.forEach(h => h.classList.remove('active'));
                    // 클릭된 탭 헤더에 active 클래스 추가
                    this.classList.add('active');
                    
                    // 모든 탭 콘텐츠 숨기기
                    const tabContents = document.querySelectorAll('#company-content .find-id-tab-content');
                    tabContents.forEach(content => content.classList.remove('active'));
                    
                    // 클릭된 탭에 해당하는 콘텐츠 표시
                    const tabContentId = this.getAttribute('data-tab') + '-content';
                    document.getElementById(tabContentId).classList.add('active');
                });
            });
            
            // 비밀번호 변경 모달 관련 스크립트
            const modal = document.getElementById("password-change-modal");
            const closeButton = document.getElementsByClassName("close-button")[0];
            
            // URL에서 토큰 파라미터를 확인하고 모달 표시
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (token) {
                document.getElementById('reset-token').value = token;
                modal.style.display = "block";
            }
            
            // 닫기 버튼 클릭 시 모달 닫기
            closeButton.onclick = function() {
                modal.style.display = "none";
            }
            
            // 모달 외부 클릭 시 모달 닫기
            window.onclick = function(event) {
                if (event.target == modal) {
                    modal.style.display = "none";
                }
            }
        });
    </script>
</body>
</html>
