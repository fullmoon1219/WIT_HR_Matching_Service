<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="sns-register-page">
    <div class="social-login-container">
        <div class="logo-container">
            <img th:src="@{/images/logo_no_background.png}" alt="로고">
        </div>
        
        <h2 class="title">회원가입</h2>
        
        <a href="#" class="social-login-btn btn-google">
            <img th:src="@{/images/icon/icon_google.png}" alt="구글"> 구글 계정으로 계속하기
        </a>
        
        <a href="#" class="social-login-btn btn-naver" style="background-color: #03C75A; color: #FFFFFF;">
            <img th:src="@{/images/icon/icon_naver.png}" alt="네이버"> 네이버 계정으로 계속하기
        </a>
        
        <a th:href="@{/hrms/login/register}" class="social-login-btn btn-email">
            <i class="far fa-envelope"></i> 이메일로 계속하기
        </a>
        
        <div class="bottom-links">
            <a th:href="@{/hrms/login/login}">이미 계정이 있으신가요? 로그인</a>
        </div>
    </div>
</body>
</html>
