<!-- /resources/templates/hrms/login/login.html -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-container">
        <div class="logo-container">
            <img th:src="@{/images/logo_no_background.png}" alt="로고">
        </div>
        
        <!-- 회원 유형 탭 -->
        <div class="tab-container">
            <div class="tab active" id="personal-tab">개인회원</div>
            <div class="tab" id="company-tab">기업회원</div>
        </div>
        
        <!-- 개인회원 로그인 폼 -->
        <div id="personal-content" class="tab-content active">
            <form method="post" th:action="@{/login}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div th:if="${errorMessage}" class="error-message">
                    <p th:text="${errorMessage}"></p>
                </div>
                
                <button type="submit" class="login-button">로그인</button>
            </form>
            
            <div class="divider"><span>또는</span></div>
            
            <div class="social-logins">
                <div class="social-login-title">간편 로그인</div>
                <div class="social-buttons">
                    <a href="#">
                        <img th:src="@{/images/icon/icon_naver.png}" alt="네이버 로그인">
                    </a>
                    <a href="#">
                        <img th:src="@{/images/icon/icon_google.png}" alt="구글 로그인">
                    </a>
                </div>
            </div>
            
            <div class="auth-links">
                <a th:href="@{/hrms/login/sns-register}">회원가입</a>
                <span class="separator">|</span>
                <a href="#">아이디 찾기</a>
                <span class="separator">|</span>
                <a href="#">비밀번호 찾기</a>
            </div>
        </div>
        
        <!-- 기업회원 로그인 폼 -->
        <div id="company-content" class="tab-content">
            <form action="#" method="post">
                <div class="form-group">
                    <label for="company-email">이메일</label>
                    <input type="text" id="company-email" name="username" class="input-field" required>
                </div>
                <div class="form-group">
                    <label for="company-password">비밀번호</label>
                    <input type="password" id="company-password" name="password" class="input-field" required>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="company-remember" name="remember">
                    <label for="company-remember">이메일 저장</label>
                </div>
                
                <button type="submit" class="login-button">로그인</button>
            </form>
            
            <div class="auth-links">
                <a th:href="@{/hrms/login/register}">회원가입</a>
                <span class="separator">|</span>
                <a href="#">아이디 찾기</a>
                <span class="separator">|</span>
                <a href="#">비밀번호 찾기</a>
            </div>
        </div>
    </div>
    
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const personalTab = document.getElementById('personal-tab');
        const companyTab = document.getElementById('company-tab');
        const personalContent = document.getElementById('personal-content');
        const companyContent = document.getElementById('company-content');
        
        personalTab.addEventListener('click', function() {
            personalTab.classList.add('active');
            companyTab.classList.remove('active');
            personalContent.classList.add('active');
            companyContent.classList.remove('active');
        });
        
        companyTab.addEventListener('click', function() {
            companyTab.classList.add('active');
            personalTab.classList.remove('active');
            companyContent.classList.add('active');
            personalContent.classList.remove('active');
        });
    });
    </script>
    </div>
</body>
</html>
